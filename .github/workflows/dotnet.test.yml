name: .NET CI

env:
  DOTNET_VERSION: '10.0.x'

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Build
      run: dotnet build

  unit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Build
      run: dotnet build
    - name: Test Unit
      run: dotnet test --verbosity normal --settings test.runsettings --filter "TestU"

  integration:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Start rippled + ledger-acceptor
      run: docker compose -f .ci-config/docker-compose.ci.yml up -d

    - name: Wait for rippled to be healthy
      run: |
        for i in $(seq 1 60); do
          if docker inspect --format='{{.State.Health.Status}}' rippled-service 2>/dev/null | grep -q healthy; then
            echo "rippled is healthy"
            break
          fi
          echo "Waiting for rippled... ($i/60)"
          sleep 2
        done

    - name: Use .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build
    - name: Test Integration
      run: dotnet test Tests/Xrpl.Tests/Xrpl.Tests.csproj --verbosity normal --settings test.runsettings --filter "TestI"
      env:
        HOST: localhost
        PORT: 6006

    - name: Stop docker containers
      if: always()
      run: docker compose -f .ci-config/docker-compose.ci.yml down