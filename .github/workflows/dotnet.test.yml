name: .NET CI

env:
  DOTNET_VERSION: '10.0.x'

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]
  workflow_dispatch:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Build
      run: dotnet build

  unit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Build
      run: dotnet build
    - name: Test Unit
      run: dotnet test --verbosity normal --settings test.runsettings --filter "TestU"

  integration:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Start rippled + ledger-acceptor
      run: docker compose -f .ci-config/docker-compose.ci.yml up -d

    - name: Wait for rippled to be ready
      run: |
        for i in $(seq 1 30); do
          if curl -sf http://localhost:5005/ -d '{"method":"server_info"}' > /dev/null 2>&1; then
            echo "rippled is ready"
            exit 0
          fi
          echo "Waiting for rippled... ($i/30)"
          sleep 2
        done
        echo "::error::rippled did not become ready after 30 attempts — dumping diagnostics"
        docker compose -f .ci-config/docker-compose.ci.yml ps
        docker compose -f .ci-config/docker-compose.ci.yml logs --no-color xrpld
        exit 1

    - name: Use .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build
    - name: Test Integration
      run: dotnet test Tests/Xrpl.Tests/Xrpl.Tests.csproj --verbosity normal --settings test.runsettings --filter "TestI"
      env:
        HOST: localhost
        PORT: 6006

    # x402 integration tests: hermetic E2E (against the standalone rippled above) plus the
    # live t54 interop tests (TestILive*), which require the public XRPL testnet faucet and
    # the t54 hosted facilitator.
    - name: Test Integration (Xrpl.X402)
      run: dotnet test Tests/Xrpl.X402.Tests/Xrpl.X402.Tests.csproj --verbosity normal --settings test.runsettings --filter "TestI"
      env:
        HOST: localhost
        PORT: 6006

    - name: Stop docker containers
      if: always()
      run: docker compose -f .ci-config/docker-compose.ci.yml down