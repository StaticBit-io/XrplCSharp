[server]
port_rpc_admin_local
port_rpc_admin
port_ws_admin

[port_rpc_admin_local]
port = 5005
ip = 0.0.0.0
admin = 0.0.0.0
protocol = http

[port_rpc_admin]
port = 5006
ip = 0.0.0.0
protocol = http
admin = 0.0.0.0

[port_ws_admin]
port = 6006
ip = 0.0.0.0
protocol = ws
admin = 0.0.0.0

[node_size]
small

[node_db]
type=RocksDB
path=/var/lib/rippled/db

[database_path]
/var/lib/rippled/db

[debug_logfile]
/var/lib/rippled/debug.log

[ledger_history]
full

[validation_seed]
ssGADm7BUDmwSWgGXg6iokLGqqHer

[validators_file]
validators.txt

[amendment_majority_time]
15 minutes

[online_delete]
0

[path_search]
7

[path_search_fast]
2

[path_search_max]
10

[rpc_startup]
{ "command": "log_level", "severity": "info" }
{ "command": "feature", "feature": "AMM", "vetoed": false }
#{ "command": "feature", "feature": "Batch", "vetoed": false }  # Batch is Supported::No in rippled 3.2.0; enable when it ships as Supported::Yes
{ "command": "feature", "feature": "Clawback", "vetoed": false }
{ "command": "feature", "feature": "AMMClawback", "vetoed": false }
{ "command": "feature", "feature": "TokenEscrow", "vetoed": false }
{ "command": "feature", "feature": "PermissionedDEX", "vetoed": false }
{ "command": "feature", "feature": "XChainBridge", "vetoed": false }
{ "command": "feature", "feature": "SingleAssetVault", "vetoed": false }
{ "command": "feature", "feature": "LendingProtocol", "vetoed": false }
{ "command": "feature", "feature": "MPTokensV1", "vetoed": false }

[features]
# Enabled at genesis for the standalone test node, aligned to the rippled 3.2.0
# supported set (image: xrpllabsofficial/xrpld:3.2.0). Amendments retired by 3.2.0
# (Flow, MultiSign, Escrow, DepositAuth, NegativeUNL, TickSize, fix1368, ...) are
# permanently baked into the protocol and MUST NOT be listed here — rippled rejects
# retired/unknown feature names at startup. Only Supported::Yes amendments are listed.
AMM
AMMClawback
Clawback
Credentials
DID
DeepFreeze
DynamicNFT
LendingProtocol
MPTokensV1
NFTokenMintOffer
PermissionedDEX
PermissionedDomains
PriceOracle
SingleAssetVault
TokenEscrow
XChainBridge
XRPFees
fixAMMClawbackRounding
fixAMMOverflowOffer
fixAMMv1_1
fixAMMv1_2
fixAMMv1_3
fixCleanup3_1_3
fixDirectoryLimit
fixDisallowIncomingV1
fixEmptyDID
fixEnforceNFTokenTrustline
fixEnforceNFTokenTrustlineV2
fixFillOrKill
fixFrozenLPTokenTransfer
fixIncludeKeyletFields
fixInnerObjTemplate
fixInnerObjTemplate2
fixInvalidTxFlags
fixMPTDeliveredAmount
fixNFTokenPageLinks
fixNFTokenReserve
fixPayChanCancelAfter
fixPreviousTxnID
fixPriceOracleOrder
fixReducedOffersV2
fixRemoveNFTokenAutoTrustLine
fixTokenEscrowV1
fixUniversalNumber
fixXChainRewardRounding

